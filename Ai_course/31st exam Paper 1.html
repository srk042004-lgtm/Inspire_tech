<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Foundation Exam | Inspire Tech Academy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #0f172a;
        color: #f8fafc;
        font-family: "Segoe UI", sans-serif;
        padding: 50px 0;
      }
      .exam-container {
        background: #1e293b;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        border: 1px solid #334155;
      }
      .question-block {
        background: #273549;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 25px;
        border-left: 5px solid #6366f1;
      }
      .option-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .option-btn {
        text-align: left;
        padding: 12px;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #334155;
        color: white;
        transition: 0.2s;
        font-size: 0.9rem;
      }
      .option-btn:hover {
        background: #475569;
      }
      .option-btn.selected {
        background: #6366f1;
        border-color: #a5b4fc;
      }
      .progress-bar {
        background-color: #6366f1;
      }
      .result-screen {
        display: none;
        text-align: center;
        padding: 40px;
      }
      .fail-text {
        color: #ef4444;
        font-weight: 800;
      }
      .pass-text {
        color: #22c55e;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="exam-container">
            <div id="exam-header">
              <h2 class="text-center mb-2">Foundation Mastery Exam</h2>
              <p class="text-center text-secondary mb-4">
                Paper 1: 4 Questions Per Page | Passing Score: 75%
              </p>
              <div class="progress mb-4" style="height: 8px">
                <div
                  id="exam-progress"
                  class="progress-bar"
                  role="progressbar"
                  style="width: 0%"
                ></div>
              </div>
            </div>

            <div id="question-container"></div>

            <div id="nav-controls" class="text-center mt-4">
              <button
                id="next-page-btn"
                class="btn btn-primary btn-lg px-5 rounded-pill"
                onclick="processPage()"
              >
                Next Page <i class="fas fa-arrow-right ms-2"></i>
              </button>
            </div>

            <div id="result-screen" class="result-screen">
              <div id="result-icon" class="display-1 mb-3"></div>
              <h1 id="result-title"></h1>
              <p id="result-score" class="fs-4"></p>
              <p id="result-message" class="mb-4"></p>
              <div id="result-actions"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/support hub.js">
      const questions = [
        {
          q: "What is the primary language used for AI in this course?",
          options: ["Java", "Python", "C++", "PHP"],
          correct: 1,
        },
        {
          q: "In Linear Regression, what does 'm' represent in y = mx + c?",
          options: ["Intercept", "Error", "Slope", "Input"],
          correct: 2,
        },
        {
          q: "Which library is used for numerical arrays in Python?",
          options: ["Pandas", "Matplotlib", "NumPy", "Flask"],
          correct: 2,
        },
        {
          q: "What is the result of 2**3 in Python?",
          options: ["6", "8", "9", "5"],
          correct: 1,
        },
        {
          q: "Which of these is a supervised learning task?",
          options: [
            "Clustering",
            "Dimensionality Reduction",
            "Regression",
            "Association",
          ],
          correct: 2,
        },
        {
          q: "What does API stand for?",
          options: [
            "Applied Program Intel",
            "Application Programming Interface",
            "Auto Process Intro",
            "None",
          ],
          correct: 1,
        },
        {
          q: "Which Python keyword is used to create a function?",
          options: ["func", "create", "def", "lambda"],
          correct: 2,
        },
        {
          q: "What is a 'Float' in programming?",
          options: [
            "A whole number",
            "A decimal number",
            "A text string",
            "A list",
          ],
          correct: 1,
        },
        {
          q: "What is the purpose of a 'for' loop?",
          options: [
            "To make decisions",
            "To repeat code",
            "To stop the program",
            "To import libraries",
          ],
          correct: 1,
        },
        {
          q: "Which of these is NOT a Python data type?",
          options: ["List", "Tuple", "Array", "Dictionary"],
          correct: 2,
        },
        {
          q: "What is the goal of Gradient Descent?",
          options: [
            "Maximize Error",
            "Minimize Cost Function",
            "Increase Speed",
            "Visualize Data",
          ],
          correct: 1,
        },
        {
          q: "In NumPy, what is an 'ndarray'?",
          options: [
            "Numerical Data",
            "N-dimensional array",
            "Name Database",
            "Next Data",
          ],
          correct: 1,
        },
        {
          q: "Which operator is used for 'Remainder' in Python?",
          options: ["/", "//", "%", "^"],
          correct: 2,
        },
        {
          q: "What does 'Fit' mean in Machine Learning?",
          options: [
            "Testing the model",
            "Training the model",
            "Deploying the model",
            "Deleting data",
          ],
          correct: 1,
        },
        {
          q: "Which library is used for data visualization?",
          options: ["Pandas", "Matplotlib", "Requests", "TensorFlow"],
          correct: 1,
        },
        {
          q: "What is a 'CSV' file?",
          options: [
            "Central Server Video",
            "Comma Separated Values",
            "Code Script Var",
            "None",
          ],
          correct: 1,
        },
        {
          q: "What is the index of the first element in a Python list?",
          options: ["1", "0", "-1", "None"],
          correct: 1,
        },
        {
          q: "Which math concept deals with matrices and vectors?",
          options: ["Calculus", "Linear Algebra", "Statistics", "Trigonometry"],
          correct: 1,
        },
        {
          q: "What is 'Mean Squared Error' used for?",
          options: [
            "Measuring accuracy",
            "Measuring loss",
            "Cleaning data",
            "Predicting weather",
          ],
          correct: 1,
        },
        {
          q: "What does 'boolean' represent?",
          options: ["Numbers", "True/False", "Text", "Coordinates"],
          correct: 1,
        },
      ];

      let currentPage = 0;
      let userAnswers = new Array(questions.length).fill(null);
      const qPerPage = 4;

      function initExam() {
        currentPage = 0;
        userAnswers.fill(null);
        document.getElementById("result-screen").style.display = "none";
        document.getElementById("exam-header").style.display = "block";
        document.getElementById("nav-controls").style.display = "block";
        document.getElementById("question-container").style.display = "block";
        renderPage();
      }

      function renderPage() {
        const container = document.getElementById("question-container");
        const start = currentPage * qPerPage;
        const end = start + qPerPage;
        const pageQuestions = questions.slice(start, end);

        const progress = (start / questions.length) * 100;
        document.getElementById("exam-progress").style.width = progress + "%";

        container.innerHTML = pageQuestions
          .map((q, index) => {
            const actualIndex = start + index;
            return `
                <div class="question-block animate__animated animate__fadeIn">
                    <h5 class="mb-3">Q${actualIndex + 1}: ${q.q}</h5>
                    <div class="option-container">
                        ${q.options
                          .map(
                            (opt, i) => `
                            <button class="option-btn ${userAnswers[actualIndex] === i ? "selected" : ""}" 
                                onclick="selectOption(${actualIndex}, ${i}, this)">
                                ${opt}
                            </button>
                        `,
                          )
                          .join("")}
                    </div>
                </div>
            `;
          })
          .join("");

        window.scrollTo(0, 0);

        const nextBtn = document.getElementById("next-page-btn");
        nextBtn.innerHTML =
          end >= questions.length
            ? "Submit Exam <i class='fas fa-check-double ms-2'></i>"
            : "Next Page <i class='fas fa-arrow-right ms-2'></i>";
      }

      function selectOption(qIdx, optIdx, btn) {
        userAnswers[qIdx] = optIdx;
        const buttons = btn.parentElement.querySelectorAll(".option-btn");
        buttons.forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
      }

      function processPage() {
        const start = currentPage * qPerPage;
        const end = Math.min(start + qPerPage, questions.length);

        // Validation: Check if all questions on current page are answered
        for (let i = start; i < end; i++) {
          if (userAnswers[i] === null) {
            alert(
              "Please answer all questions on this page before moving forward.",
            );
            return;
          }
        }

        if (end < questions.length) {
          currentPage++;
          renderPage();
        } else {
          calculateResult();
        }
      }

      function calculateResult() {
        let score = 0;
        questions.forEach((q, i) => {
          if (userAnswers[i] === q.correct) score++;
        });

        const percentage = (score / questions.length) * 100;
        document.getElementById("exam-header").style.display = "none";
        document.getElementById("question-container").style.display = "none";
        document.getElementById("nav-controls").style.display = "none";

        const resultScreen = document.getElementById("result-screen");
        resultScreen.style.display = "block";

        const scoreText = document.getElementById("result-score");
        const title = document.getElementById("result-title");
        const msg = document.getElementById("result-message");
        const icon = document.getElementById("result-icon");
        const actions = document.getElementById("result-actions");

        scoreText.innerText = `Score: ${score} / ${questions.length} (${percentage}%)`;

        if (percentage >= 75) {
          icon.innerHTML = '<i class="fas fa-trophy text-warning"></i>';
          title.innerHTML = '<span class="pass-text">CONGRATULATIONS!</span>';
          msg.innerText =
            "You have shown true mastery. You are officially cleared for the next stage of the AI Specialist track.";
          actions.innerHTML =
            '<a href="Ai_course/32nd exam Paper 2.html" class="btn btn-success btn-lg px-5 rounded-pill">Proceed to Paper 2 <i class="fas fa-arrow-right ms-2"></i></a>';
        } else {
          icon.innerHTML = '<i class="fas fa-book-open text-danger"></i>';
          title.innerHTML = '<span class="fail-text">NOT READY YET</span>';
          msg.innerText =
            "You did not reach the 75% threshold. You are not ready for the next exam. Please go back, read your subjects thoroughly, and try again when you are prepared.";
          actions.innerHTML =
            '<button class="btn btn-danger btn-lg px-5 rounded-pill" onclick="initExam()">Try Again <i class="fas fa-redo ms-2"></i></button>';
        }
      }

      initExam();
    </script>
  </body>
</html>
